# iac/manifest.yaml
# S7 Fedora Base — declarative audit source of truth.
# audit-pre.sh and audit-post.sh read this file. The Containerfile.base
# must stay consistent with it. A mismatch is an audit failure, not a bug.

fork_of:
  registry: quay.io
  image: fedora/fedora-minimal
  tag: "44"
  # Fedora signing key fingerprint prefix — audit-pre.sh verifies the pulled
  # image was signed by a key whose fingerprint begins with this.
  signing_key_fingerprint_prefix: "4F2E 4CD1 6A0F 1E57"

packages:
  must_include:
    - ca-certificates
    - openssl
    - shadow-utils      # provides /usr/bin/passwd in Fedora 44+
    - tzdata
    - procps-ng
    - iproute
    - iputils
    - glibc-langpack-en
    - python3
    - python3-pip
  must_exclude:
    - openssh-server
    - telnet
    - rsh
    - ftp
    - firewalld
    - NetworkManager

users:
  must_include:
    - name: s7
      uid: 1000
      gid: 1000
      home: /var/lib/s7
      shell: /sbin/nologin
  root_must_be_locked: true
  root_shell_must_be: /sbin/nologin

directories:
  must_exist:
    - path: /var/lib/s7
      owner: s7
      group: s7
      mode: "0750"
    - path: /etc/s7
      owner: s7
      group: s7
      mode: "0750"
    - path: /var/log/s7
      owner: s7
      group: s7
      mode: "0750"

files:
  must_exist:
    - path: /etc/s7/base.covenant
      mode: "0644"
      must_contain: "CWS-BSL-1.1"

network:
  exposed_ports_max: 0

default_user:
  name: s7
  uid: 1000

build:
  chunk_size_bytes: 104857600
  image_name: "localhost/s7-fedora-base"
  default_tag_format: "v%Y.%m.%d"

# ── Intake gate (iac/intake/) ──
# Every upstream artifact pulled by iac/intake/pull-*.sh must be
# pinned here. An unpinned artifact cannot pass the gate. See
# iac/intake/README.md for the contract.
