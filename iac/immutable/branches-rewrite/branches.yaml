      cname: "123tech.skyqubi.com"
      source_branch: main
      source_path: "/docs"             # TBD — confirm with Jamie before enabling
      public_from_private: false       # Path A = not applicable

# ═══════════════════════════════════════════════════════════════════
# MAIN BRANCH CONTENT — pushed from GOLD tarballs
# ═══════════════════════════════════════════════════════════════════
mains:
  - branch: main
    repo: skyqubi-private
    tarball: skyqubi-private-main-v6.tar.gz
    signature: skyqubi-private-main-v6.tar.gz.asc
    source_commit: "2185017"
    # Content ambiguity — local HEAD is at b22c009 (one commit ahead of GOLD).
    # Jamie must pick: (a) GOLD tarball, (b) local HEAD, (c) re-cut new tarball
    # from local HEAD, (d) GOLD root + cherry-pick b22c009. Default = NO default.
    ambiguity_pending_resolution: true

  - branch: main
    repo: skyqubi-public
    tarball: skyqubi-public-main-v6.tar.gz
    signature: skyqubi-public-main-v6.tar.gz.asc
    source_commit: "2d955e9"
    ambiguity_pending_resolution: false  # local clean, matches tarball sha

