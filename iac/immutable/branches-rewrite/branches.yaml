# S7 Immutable Branches Topology — v6 GOLD (branches-rewrite)
#
# Single source of truth for every rewritten script in this directory.
# Replaces the repo-based genesis-content.yaml with a branch-based map.
#
# Architecture preserved: "Sync to private. Rebuild public from the private
# immutable fork." Packaging changed: each immutable is now an ORPHAN BRANCH
# inside skyqubi-private that holds exactly one signed tarball + sig +
# per-branch MANIFEST.md. Three files per branch. Blast radius = 1 file.
#
# All tarball names follow: <repo-scope>-<branch>-v<version>.tar.gz
# All signatures: <tarball>.asc (detached ASCII armor, GPG E11792E0AD945BE9)
# All branches protected by: iac/immutable/branches-rewrite/apply-branch-protection.sh
#
# Ceremony preservation: registry.yaml remains the append-only advance ledger.
# rebuild-public.sh remains ceremony-gated. advance-immutable.sh remains a stub
# until the first human-led ceremony. This rewrite does not cross ceremony gates.

meta:
  version: v6
  generated_at: "2026-04-15"
  core_update: "v6"
  authority: "Chair-draft under Jamie's 16hr SOLO block, Samuel-guarded"
  gold_archive_dir: "/s7/v6-gold-2026-04-15"
  signing_key: "E11792E0AD945BE9"
  signed_by: "skycair-code"
  pending_witness:
    - "Tonya on immutable-gold-assets (skyqubi-immutable lineage — she signed the design)"
    - "Tonya on immutable-bootc-assets (branding was her 2026-04-12 signoff)"
    - "Tonya + council on first immutable-gold-assets-v7 advance (yearly ceremony)"

repos:
  skyqubi-private:
    owner: skycair-code
    visibility: private
    enterprise_linked: true           # linked into SkyQUBi enterprise via Path A
    default_branch: main
    holds_immutable_branches: true

  skyqubi-public:
    owner: skycair-code
    visibility: public
    enterprise_linked: true
    default_branch: main
    holds_immutable_branches: false
