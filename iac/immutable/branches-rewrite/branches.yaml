# ═══════════════════════════════════════════════════════════════════
# PER-BRANCH FILE LAYOUT (identical for every immutable branch)
# ═══════════════════════════════════════════════════════════════════
# Each orphan branch contains exactly these three files at the root:
#
#   <tarball>.tar.gz         the payload
#   <tarball>.tar.gz.asc     detached GPG signature
#   MANIFEST.md              per-branch manifest with sha256, provenance,
#                            source_commit, created_at, role, notes
#
# No other files. No .gitignore. No README.md separate from MANIFEST.md.
# The branch tree is 3 files and nothing else. Any additional file
# changes blast radius — keep the branch tree minimal.
#
# For versioned branches (immutable-gold-assets only in v6 round 1):
#   <tarball>-v6.tar.gz      payload for v6
#   <tarball>-v6.tar.gz.asc
#   <tarball>-v7.tar.gz      payload for v7 (added at future advance)
#   <tarball>-v7.tar.gz.asc
#   MANIFEST.md              enumerates every version with retired/active status

# ═══════════════════════════════════════════════════════════════════
# PROTECTION STACK (applied to every immutable branch)
# ═══════════════════════════════════════════════════════════════════
# When a branch is pushed for the first time, apply-branch-protection.sh
# applies the following. Payload is EXPLICIT — no silent additions.
#
# protection_payload:
#   enforce_admins: true
#   required_linear_history: true
#   allow_force_pushes: false
#   allow_deletions: false
#   required_conversation_resolution: true
#   required_pull_request_reviews: null   # no PR required (solo maintainer)
#   required_status_checks: null          # no CI checks required yet
#   restrictions: null                    # no user/team allowlist
# plus separately:
#   required_signatures: true             # POSTed to the signatures endpoint
#
# bypass_actors: [] (empty — no backdoors)
# rulesets:       [] (none — branch protection only, no overlapping rulesets)
