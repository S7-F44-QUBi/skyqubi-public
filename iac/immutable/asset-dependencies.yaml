# ═══════════════════════════════════════════════════════════════════
# DEPLOY PROFILES (which categories get pulled for which build)
# ═══════════════════════════════════════════════════════════════════
#
# Future Actions workflows use these profiles to decide which subset of
# the 7 categories to fetch for a given build type. Not used in Phase 1 —
# reserved for when yearly-ceremony.yml lands.

profiles:

  qubi_alone:
    description: "Mode 1 — QUBi self-contained OCI container for existing F44 hosts"
    categories: [qubi, cws, ssl, auditbuilds]

  f44_bootc_os:
    description: "Mode 2 — SkyCAIR v7 OS layers (F44 + BootC) for in-place OS updates"
    categories: [bootc, f44, auditbuilds, ssl]

  full_install:
    description: "Mode 3 — Fresh-install ISO with everything baked in"
    categories: [qubi, cws, ssl, bootc, f44, auditbuilds, gold]
