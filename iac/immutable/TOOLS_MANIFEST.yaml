# S7 SkyQUBi — Tools Manifest
#
# Single source of truth for every tool in the QUBi toolset.
# Every subsequent artifact (install path, audit check, bootc
# image contents, CHEF recipe) should reference this file by
# tool name rather than hardcoding paths.
#
# Schema per tool:
#   name:            short canonical name
#   path:            absolute path to the canonical source
#   category:        engine | service | audit | install | recipe | memory | branding | boot | compliance | lifecycle | council | persona | mcp
#   pillar:          SYNC | SAFE | LYNC | [multi]
#   owner:           chair | jamie | tonya | household | samuel | carli | elias
#   airgap:          clean | partial | blocked | n-a
#   bootc:           in-image | install-time | runtime | n-a
#   tier:            covenant | pinned-methodology | pinned-project | draft | operational | stub
#   depends_on:      [list of tool names]
#   notes:           one-line context
#
# Airgap legend:
#   clean         — operates with zero outbound network
#   partial       — needs network for first setup, then offline
#   blocked       — currently has outbound dependency not yet eliminated
#   n-a           — not applicable (documentation, config)
#
# Bootc legend:
#   in-image      — baked into the bootc OCI artifact; present at first boot
#   install-time  — installed by the bootc first-boot ceremony
#   runtime       — added after install (user-controlled)
#   n-a           — not applicable
#
# Tier legend (maps to memory pillar+weight or recipe status):
#   covenant              — weight 5, COVENANT-GRADE
#   pinned-methodology    — weight 4, pinned rule
#   pinned-project        — weight 3, current state
#   draft                 — CHAIR-DRAFT or JAMIE-AUTHORIZED-IN-TONYAS-STEAD
#   operational           — running service, not a memory tier
#   stub                  — placeholder, refuses real runs
#
# Status as of 2026-04-14 session close. Future sessions update
# this file as tools are added, migrated, promoted, or retired.

