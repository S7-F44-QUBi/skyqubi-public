    found_in: engine/s7_skyavi_monitors.py:_run_sync
    severity: MEDIUM
    finding: "subprocess.run(..., shell=True, ...) — would be injection if templated"
    owner: jamie
    acknowledged: 2026-04-13
    remediated_at_source: 2026-04-14
    target_window: GOLIVE-Release-7
    reason: "Original 2026-04-13 finding: shell=True with f-string interpolation risk. 2026-04-14 REMEDIATION: the one templated call site (monitor_service_health restart) now uses shlex.quote() on the svc variable. shell=True is RETAINED because the other 9 call sites in this file genuinely require shell features (pipes, stderr redirects, ||-fallback patterns, globs). The class-of-bug 'would be injection if templated' is now closed at the one call site that was templated, and the function's docstring now names the invariant that any future call site MUST either use a hardcoded string literal OR shlex.quote() on every interpolated variable. The audit gate's grep still matches shell=True literals in the file (including documentation mentions), so this pin stays as a permanent reminder. The full refactor to shell=False with per-call-site pipe/redirect handling is deferred to a future Core Update session as a code quality improvement, not a security fix."
    detector: bandit
    rule: B602

