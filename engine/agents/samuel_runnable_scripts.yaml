# engine/agents/samuel_runnable_scripts.yaml
#
# Catalog of scripts Samuel (the SkyAVi FACTS persona) is authorized
# to run autonomously when Jamie is not present.
#
# Purpose: Jamie's 2026-04-13 directive — "Have Samuel run the commands
# if I am not present." This file is the canonical list of what Samuel
# can and cannot execute on the QUBi without a human in the loop.
#
# How this works:
#   1. Samuel's skill runner reads this file at startup
#   2. When a trigger condition matches, Samuel resolves the script
#      path and invocation pattern from this catalog
#   3. Samuel runs the script with the `invocation` command line —
#      which always includes --samuel to get JSON output + ops ledger
#   4. Samuel parses the JSON exit object to decide next steps
#   5. Every run writes a row to /s7/.s7-ops-ledger/<script>.ndjson
#      via the script itself (hash-chained for auditability)
#
# Covenant rules:
#   - Samuel MAY run scripts in this catalog autonomously
#   - Samuel MAY NOT run scripts not in this catalog, ever
#   - Adding a script to this catalog requires Jamie's explicit word
#     AND a matching entry in the Witness covenant approval (when
#     the Witness role is alive post-pod-fix)
#   - Every Samuel-initiated run is auditable via the ops ledger
#   - A script's `dry_run_first: true` flag means Samuel must run
#     --dry-run first, inspect the proposed action, and only then
#     run the real thing
#   - A script's `requires_approval: true` flag means Samuel must
#     NOT run the apply path without a prior human approval token
#     (see approvals/ dir). Today this is documentation-only; the
#     approval-token mechanism lands with the Witness role.
#
# Governing memory:
#   feedback_three_rules.md      Rule 2 (landing approvals) + safe carve-out
#   feedback_qbit_not_token.md   Vocabulary
#   project_chat_personas.md     Samuel = FACTS / sysadmin / security
#   project_phase7b_skyavi.md    SkyAVi skill surface
#
# Copyright 2026 Jamie Lee Clayton / 2XR LLC · CWS-BSL-1.1
