# S7 SkyQUBi — kitty terminal config
# Sandy Sunset Deep Pastel palette · Tonya-approved 2026-04-12
# Canonical palette source: /s7/skyqubi-private/branding/palette.json

# ── Font ─────────────────────────────────────────────────────────
font_family           JetBrains Mono
bold_font             JetBrains Mono Bold
italic_font           JetBrains Mono Italic
bold_italic_font      JetBrains Mono Bold Italic
font_size             12.0
disable_ligatures     never

# ── Window ───────────────────────────────────────────────────────
window_padding_width  8
hide_window_decorations no
confirm_os_window_close 0
window_alert_on_bell  yes
enable_audio_bell     no

# ── Tabs — always visible, easy to spot ──────────────────────────
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      1
tab_activity_symbol   ●
tab_title_template    "{fmt.fg._f4c97b}{index}{fmt.fg.default} {title}"
active_tab_title_template "{fmt.fg._f4c97b}{fmt.bold}{index} ▸ {title}{fmt.nobold}{fmt.fg.default}"
active_tab_foreground #1a0f1c
active_tab_background #f4c97b
active_tab_font_style bold
inactive_tab_foreground #c4a699
inactive_tab_background #3d2232
inactive_tab_font_style normal
tab_separator         "  "

# ── Cursor ───────────────────────────────────────────────────────
cursor                #f4c97b
cursor_text_color     #1a0f1c
cursor_shape          beam
cursor_blink_interval 0.5

# ── Selection ────────────────────────────────────────────────────
selection_foreground  #1a0f1c
selection_background  #f5b98d

# ── URLs ─────────────────────────────────────────────────────────
url_color             #c9a4d1
url_style             curly
show_hyperlink_targets yes

# ── Sandy Sunset color palette ───────────────────────────────────
foreground            #faebd4
background            #1a0f1c
background_opacity    0.92
dynamic_background_opacity yes

# Normal colors
color0                #301a27
color1                #ea8c7a
color2                #f5b98d
color3                #f4c97b
color4                #c9a4d1
color5                #b485c0
color6                #e8a575
color7                #faebd4

# Bright colors
color8                #6b3f4f
color9                #d78689
color10               #f8dcb5
color11               #d9a15b
color12               #c9a4d1
color13               #9b6fa8
color14               #e8a575
color15               #fff8ec

# ── Shell ────────────────────────────────────────────────────────
shell                 /bin/bash
shell_integration     enabled

# ── Scrollback ───────────────────────────────────────────────────
scrollback_lines      20000
scrollback_pager_history_size 20

# ── Mouse ────────────────────────────────────────────────────────
copy_on_select        yes
strip_trailing_spaces smart

# ── Performance ──────────────────────────────────────────────────
repaint_delay         8
input_delay           2
sync_to_monitor       yes

# ══════════════════════════════════════════════════════════════════
# Key bindings — tabs, user switching, clipboard, splits
# ══════════════════════════════════════════════════════════════════

# ── Tab management ───────────────────────────────────────────────
map ctrl+shift+t      new_tab_with_cwd
map ctrl+t            new_tab_with_cwd
map ctrl+shift+w      close_tab
map ctrl+shift+right  next_tab
map ctrl+shift+left   previous_tab
map ctrl+tab          next_tab
map ctrl+shift+tab    previous_tab
map ctrl+shift+1      goto_tab 1
map ctrl+shift+2      goto_tab 2
map ctrl+shift+3      goto_tab 3
map ctrl+shift+4      goto_tab 4
map ctrl+shift+5      goto_tab 5
map ctrl+shift+6      goto_tab 6
map ctrl+shift+7      goto_tab 7
map ctrl+shift+8      goto_tab 8
map ctrl+shift+9      goto_tab 9
map ctrl+shift+alt+t  set_tab_title

# ── User switching / privilege escalation (in a new tab) ────────
# Ctrl+Shift+U opens a new tab running as root
map ctrl+shift+u      launch --type=tab --cwd=current sudo -i
# Ctrl+Shift+S starts an su session in a new tab
map ctrl+shift+s      launch --type=tab --cwd=current su -

# ── Splits (kitty calls them "windows" inside a tab) ────────────
map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+\      launch --location=vsplit --cwd=current
map ctrl+shift+-      launch --location=hsplit --cwd=current
map ctrl+shift+n      next_window
map ctrl+shift+p      previous_window
map ctrl+shift+q      close_window

# ── Clipboard ───────────────────────────────────────────────────
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard

# ── Font size on the fly ────────────────────────────────────────
map ctrl+plus         change_font_size all +1.0
map ctrl+equal        change_font_size all +1.0
map ctrl+minus        change_font_size all -1.0
map ctrl+0            change_font_size all 0

# ── Background opacity ──────────────────────────────────────────
map ctrl+shift+a>m    set_background_opacity +0.1
map ctrl+shift+a>l    set_background_opacity -0.1
map ctrl+shift+a>1    set_background_opacity 1
map ctrl+shift+a>d    set_background_opacity default

# ── Scrollback search ───────────────────────────────────────────
map ctrl+shift+f      show_scrollback
map ctrl+shift+h      show_last_command_output
